<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商业问题智能分析系统 - 单文件版</title>
    <style>
        /* 完整的CSS样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 30px;
            align-items: start;
        }

        .dialog-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .dialog-header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dialog-header h2 {
            font-size: 1.5rem;
        }

        .api-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e74c3c;
        }

        .status-dot.connected {
            background: #2ecc71;
        }

        .dialog-body {
            padding: 0;
        }

        .input-section {
            padding: 30px;
            border-bottom: 1px solid #eee;
        }

        .input-section label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #2c3e50;
        }

        .input-section textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            resize: vertical;
            transition: border-color 0.3s ease;
        }

        .input-section textarea:focus {
            outline: none;
            border-color: #3498db;
        }

        .input-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #219a52;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .api-config-section {
            border-bottom: 1px solid #eee;
        }

        .config-toggle {
            padding: 15px 30px;
            background: #f8f9fa;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            color: #2c3e50;
        }

        .config-toggle:hover {
            background: #e9ecef;
        }

        .toggle-arrow {
            transition: transform 0.3s ease;
        }

        .toggle-arrow.open {
            transform: rotate(180deg);
        }

        .config-content {
            padding: 0 30px;
            max-height: 0;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .config-content.open {
            padding: 20px 30px;
            max-height: 200px;
        }

        .config-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .config-form label {
            font-weight: 600;
            color: #2c3e50;
        }

        .config-form input,
        .config-form select {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 0.95rem;
        }

        .config-form input:focus,
        .config-form select:focus {
            outline: none;
            border-color: #3498db;
        }

        .result-section {
            padding: 30px;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .result-header h3 {
            color: #2c3e50;
        }

        .result-actions {
            display: flex;
            gap: 10px;
        }

        .result-content {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
            line-height: 1.6;
        }

        .result-content h4 {
            color: #2c3e50;
            margin: 15px 0 10px 0;
        }

        .result-content p {
            margin-bottom: 10px;
        }

        .result-content ul, .result-content ol {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        .result-content li {
            margin-bottom: 5px;
        }

        .sidebar {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 20px;
            height: fit-content;
        }

        .sidebar h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #3498db;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-item {
            padding: 12px;
            background: #f8f9fa;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s ease;
            border-left: 3px solid #3498db;
        }

        .history-item:hover {
            background: #e9ecef;
        }

        .history-item .question {
            font-weight: 600;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .history-item .time {
            font-size: 0.8rem;
            color: #7f8c8d;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow: hidden;
        }

        .modal-header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            margin: 0;
        }

        .close {
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }

        .close:hover {
            opacity: 0.7;
        }

        .modal-body {
            padding: 20px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .loading-spinner {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .loading-spinner::before {
            content: '';
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .input-actions {
                flex-direction: column;
            }

            .result-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .result-actions {
                width: 100%;
                justify-content: space-between;
            }
        }

        .welcome-message {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="welcome-message">
            <h3>🎉 欢迎使用商业问题智能分析系统！</h3>
            <p>这是一个完整的单文件应用，无需安装，直接在浏览器中运行</p>
            <p><strong>使用方法：</strong> 配置API密钥 → 输入商业问题 → 获取专业分析</p>
        </div>

        <header class="header">
            <h1>商业问题智能分析系统</h1>
            <p>输入商业问题，获取精准分析并生成专业文档</p>
        </header>

        <div class="main-content">
            <div class="dialog-container">
                <div class="dialog-header">
                    <h2>商业问题分析</h2>
                    <div class="api-status" id="apiStatus">
                        <span class="status-dot"></span>
                        <span>API状态: 未配置</span>
                    </div>
                </div>

                <div class="dialog-body">
                    <div class="input-section">
                        <label for="questionInput">请输入商业问题：</label>
                        <textarea
                            id="questionInput"
                            placeholder="例如：如何提高产品的市场占有率？\n当前面临的主要挑战是什么？\n未来的增长策略应该如何规划？"
                            rows="4"
                        ></textarea>
                        <div class="input-actions">
                            <button id="analyzeBtn" class="btn btn-primary">
                                <span class="btn-text">开始分析</span>
                                <span class="loading-spinner" style="display: none;">分析中...</span>
                            </button>
                            <button id="clearBtn" class="btn btn-secondary">清空</button>
                        </div>
                    </div>

                    <div class="api-config-section">
                        <div class="config-toggle" id="configToggle">
                            <span>API配置</span>
                            <span class="toggle-arrow">▼</span>
                        </div>
                        <div class="config-content" id="configContent" style="display: none;">
                            <div class="config-form">
                                <label for="apiKey">OpenAI API Key:</label>
                                <input type="password" id="apiKey" placeholder="请输入您的OpenAI API密钥">
                                <label for="modelSelect">选择模型:</label>
                                <select id="modelSelect">
                                    <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                                    <option value="gpt-4" selected>GPT-4</option>
                                    <option value="gpt-4-turbo">GPT-4 Turbo</option>
                                </select>
                                <button id="saveConfigBtn" class="btn btn-primary">保存配置</button>
                            </div>
                        </div>
                    </div>

                    <div class="result-section" id="resultSection" style="display: none;">
                        <div class="result-header">
                            <h3>分析结果</h3>
                            <div class="result-actions">
                                <button id="exportMdBtn" class="btn btn-success">导出Markdown</button>
                                <button id="copyResultBtn" class="btn btn-secondary">复制结果</button>
                            </div>
                        </div>
                        <div class="result-content" id="resultContent"></div>
                    </div>
                </div>
            </div>

            <div class="sidebar">
                <h3>历史记录</h3>
                <div class="history-list" id="historyList"></div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">导出文档</h3>
                <span class="close" id="closeModal">&times;</span>
            </div>
            <div class="modal-body">
                <div id="modalContent"></div>
            </div>
        </div>
    </div>

    <script>
        // 完整的JavaScript代码
        class BusinessDialog {
            constructor() {
                this.apiKey = '';
                this.model = 'gpt-4';
                this.history = [];
                this.currentResult = '';
                this.init();
            }

            init() {
                this.bindEvents();
                this.loadConfig();
                this.loadHistory();
                console.log('商业问题分析系统已初始化');
            }

            bindEvents() {
                document.getElementById('configToggle').addEventListener('click', () => this.toggleConfig());
                document.getElementById('saveConfigBtn').addEventListener('click', () => this.saveConfig());
                document.getElementById('analyzeBtn').addEventListener('click', () => this.analyzeQuestion());
                document.getElementById('clearBtn').addEventListener('click', () => this.clearInput());
                document.getElementById('exportMdBtn').addEventListener('click', () => this.exportMarkdown());
                document.getElementById('copyResultBtn').addEventListener('click', () => this.copyResult());
                document.getElementById('closeModal').addEventListener('click', () => this.closeModal());
                document.getElementById('modal').addEventListener('click', (e) => {
                    if (e.target.id === 'modal') this.closeModal();
                });
                document.getElementById('questionInput').addEventListener('keydown', (e) => {
                    if (e.ctrlKey && e.key === 'Enter') this.analyzeQuestion();
                });
            }

            toggleConfig() {
                const content = document.getElementById('configContent');
                const arrow = document.querySelector('.toggle-arrow');
                if (content.style.display === 'none') {
                    content.style.display = 'block';
                    content.classList.add('open');
                    arrow.classList.add('open');
                } else {
                    content.style.display = 'none';
                    content.classList.remove('open');
                    arrow.classList.remove('open');
                }
            }

            saveConfig() {
                const apiKey = document.getElementById('apiKey').value.trim();
                const model = document.getElementById('modelSelect').value;
                if (!apiKey) {
                    this.showMessage('请输入有效的API密钥', 'error');
                    return;
                }
                this.apiKey = apiKey;
                this.model = model;
                localStorage.setItem('businessDialog_apiKey', apiKey);
                localStorage.setItem('businessDialog_model', model);
                this.updateApiStatus(true);
                this.showMessage('配置保存成功！', 'success');
                this.toggleConfig();
            }

            loadConfig() {
                const savedApiKey = localStorage.getItem('businessDialog_apiKey');
                const savedModel = localStorage.getItem('businessDialog_model');
                if (savedApiKey) {
                    this.apiKey = savedApiKey;
                    document.getElementById('apiKey').value = savedApiKey;
                }
                if (savedModel) {
                    this.model = savedModel;
                    document.getElementById('modelSelect').value = savedModel;
                }
                this.updateApiStatus(!!savedApiKey);
            }

            updateApiStatus(connected) {
                const statusDot = document.querySelector('.status-dot');
                const statusText = document.querySelector('#apiStatus span:last-child');
                if (connected) {
                    statusDot.classList.add('connected');
                    statusText.textContent = 'API状态: 已连接';
                } else {
                    statusDot.classList.remove('connected');
                    statusText.textContent = 'API状态: 未配置';
                }
            }

            async analyzeQuestion() {
                const question = document.getElementById('questionInput').value.trim();
                if (!question) {
                    this.showMessage('请输入商业问题', 'error');
                    return;
                }
                if (!this.apiKey) {
                    this.showMessage('请先配置API密钥', 'error');
                    this.toggleConfig();
                    return;
                }
                this.setLoading(true);
                try {
                    const response = await this.callOpenAI(question);
                    this.displayResult(response);
                    this.saveToHistory(question, response);
                } catch (error) {
                    console.error('分析错误:', error);
                    this.showMessage('分析失败: ' + error.message, 'error');
                } finally {
                    this.setLoading(false);
                }
            }

            async callOpenAI(question) {
                const prompt = this.buildPrompt(question);
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${this.apiKey}`
                    },
                    body: JSON.stringify({
                        model: this.model,
                        messages: [
                            {
                                role: 'system',
                                content: '你是一位专业的商业分析师，擅长分析各种商业问题并提供结构化的解决方案。请用中文回答，使用专业的商业术语，并提供可执行的建议。'
                            },
                            {
                                role: 'user',
                                content: prompt
                            }
                        ],
                        max_tokens: 2000,
                        temperature: 0.7
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || 'API调用失败');
                }

                const data = await response.json();
                return data.choices[0].message.content;
            }

            buildPrompt(question) {
                return `请分析以下商业问题，并按照以下结构提供专业回答：

商业问题：${question}

请提供以下内容：

## 问题分析
- 核心问题识别
- 相关背景分析
- 关键影响因素

## 解决方案建议
- 主要策略方向
- 具体实施步骤
- 预期效果评估

## 风险提示
- 潜在风险点
- 风险规避建议
- 应急预案

## 后续行动计划
- 短期行动项（1-3个月）
- 中期规划（3-12个月）
- 长期战略（1年以上）

请使用专业的商业分析语言，确保回答结构清晰、内容实用。`;
            }

            displayResult(content) {
                this.currentResult = content;
                const resultSection = document.getElementById('resultSection');
                const resultContent = document.getElementById('resultContent');
                resultContent.innerHTML = this.markdownToHtml(content);
                resultSection.style.display = 'block';
                resultSection.scrollIntoView({ behavior: 'smooth' });
            }

            markdownToHtml(markdown) {
                return markdown
                    .replace(/^##\s+(.+)$/gm, '<h4>$1</h4>')
                    .replace(/^###\s+(.+)$/gm, '<h5>$1</h5>')
                    .replace(/^-\s+(.+)$/gm, '<li>$1</li>')
                    .replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>')
                    .replace(/\n\n/g, '</p><p>')
                    .replace(/\n/g, '<br>')
                    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.+?)\*/g, '<em>$1</em>')
                    .replace(/`(.+?)`/g, '<code>$1</code>');
            }

            setLoading(loading) {
                const btn = document.getElementById('analyzeBtn');
                const btnText = btn.querySelector('.btn-text');
                const spinner = btn.querySelector('.loading-spinner');
                if (loading) {
                    btn.disabled = true;
                    btnText.style.display = 'none';
                    spinner.style.display = 'inline-flex';
                } else {
                    btn.disabled = false;
                    btnText.style.display = 'inline';
                    spinner.style.display = 'none';
                }
            }

            clearInput() {
                document.getElementById('questionInput').value = '';
                document.getElementById('resultSection').style.display = 'none';
                this.currentResult = '';
            }

            exportMarkdown() {
                if (!this.currentResult) {
                    this.showMessage('没有可导出的内容', 'error');
                    return;
                }
                const timestamp = new Date().toLocaleString('zh-CN');
                const question = document.getElementById('questionInput').value.trim();
                const markdownContent = `# 商业问题分析报告\n\n**生成时间：** ${timestamp}\n**商业问题：** ${question}\n\n${this.currentResult}\n\n---\n*本报告由商业问题智能分析系统生成*`;
                this.showModal('导出Markdown文档', markdownContent, true);
            }

            copyResult() {
                if (!this.currentResult) {
                    this.showMessage('没有可复制的内容', 'error');
                    return;
                }
                navigator.clipboard.writeText(this.currentResult).then(() => {
                    this.showMessage('结果已复制到剪贴板', 'success');
                }).catch(() => {
                    this.showMessage('复制失败，请手动复制', 'error');
                });
            }

            saveToHistory(question, answer) {
                const historyItem = {
                    id: Date.now(),
                    question: question,
                    answer: answer,
                    timestamp: new Date().toLocaleString('zh-CN'),
                    preview: question.substring(0, 50) + (question.length > 50 ? '...' : '')
                };
                this.history.unshift(historyItem);
                if (this.history.length > 10) {
                    this.history = this.history.slice(0, 10);
                }
                localStorage.setItem('businessDialog_history', JSON.stringify(this.history));
                this.renderHistory();
            }

            loadHistory() {
                const savedHistory = localStorage.getItem('businessDialog_history');
                if (savedHistory) {
                    this.history = JSON.parse(savedHistory);
                    this.renderHistory();
                }
            }

            renderHistory() {
                const historyList = document.getElementById('historyList');
                if (this.history.length === 0) {
                    historyList.innerHTML = '<div style="text-align: center; color: #7f8c8d; padding: 20px;">暂无历史记录</div>';
                    return;
                }
                historyList.innerHTML = this.history.map(item => `
                    <div class="history-item" onclick="dialog.loadHistoryItem('${item.id}')">
                        <div class="question">${item.preview}</div>
                        <div class="time">${item.timestamp}</div>
                    </div>
                `).join('');
            }

            loadHistoryItem(id) {
                const item = this.history.find(h => h.id.toString() === id);
                if (item) {
                    document.getElementById('questionInput').value = item.question;
                    this.displayResult(item.answer);
                    this.showMessage('已加载历史记录', 'success');
                }
            }

            showModal(title, content, showCopyButton = false) {
                document.getElementById('modalTitle').textContent = title;
                let modalContent = `<div style="max-height: 400px; overflow-y: auto; background: #f8f9fa; padding: 15px; border-radius: 6px; font-family: monospace; white-space: pre-wrap; font-size: 0.9rem;">${content}</div>`;
                if (showCopyButton) {
                    modalContent += `
                        <div style="margin-top: 20px; display: flex; gap: 10px;">
                            <button onclick="dialog.downloadMarkdown()" class="btn btn-primary" style="flex: 1;">下载文件</button>
                            <button onclick="dialog.copyModalContent()" class="btn btn-secondary" style="flex: 1;">复制内容</button>
                        </div>
                    `;
                }
                document.getElementById('modalContent').innerHTML = modalContent;
                document.getElementById('modal').style.display = 'flex';
            }

            closeModal() {
                document.getElementById('modal').style.display = 'none';
            }

            downloadMarkdown() {
                const content = document.querySelector('#modalContent pre') ? document.querySelector('#modalContent pre').textContent : document.querySelector('#modalContent div').textContent;
                const blob = new Blob([content], { type: 'text/markdown' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `商业分析报告_${new Date().toISOString().split('T')[0]}.md`;
                a.click();
                URL.revokeObjectURL(url);
                this.showMessage('文件下载成功', 'success');
            }

            copyModalContent() {
                const content = document.querySelector('#modalContent pre') ? document.querySelector('#modalContent pre').textContent : document.querySelector('#modalContent div').textContent;
                navigator.clipboard.writeText(content).then(() => {
                    this.showMessage('内容已复制到剪贴板', 'success');
                });
            }

            showMessage(message, type) {
                const messageEl = document.createElement('div');
                messageEl.className = `message message-${type}`;
                messageEl.textContent = message;
                messageEl.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    padding: 12px 20px;
                    border-radius: 6px;
                    color: white;
                    font-weight: 600;
                    z-index: 1001;
                    transition: all 0.3s ease;
                    ${type === 'success' ? 'background: #27ae60;' : 'background: #e74c3c;'}
                `;
                document.body.appendChild(messageEl);
                setTimeout(() => {
                    messageEl.style.transform = 'translateX(100%)';
                    setTimeout(() => {
                        document.body.removeChild(messageEl);
                    }, 300);
                }, 3000);
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            window.dialog = new BusinessDialog();
        });
    </script>
</body>
</html>
